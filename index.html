<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My First Chart - Kids Themes + Stocks</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 20px; background: #f9f9f9; }
    h1 { color: #ff69b4; }
    #chart { width: 100%; max-width: 800px; height: 500px; margin: 20px auto; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>Welcome to Little Learners Club!</h1>
  <p>Free preschool/daycare website themes + fun stock chart demo</p>

  <h2>Simple Stock Price Chart (AAPL Example)</h2>
  <div id="chart"></div>

  <!-- Load the free chart library from CDN -->
  <script src="https://unpkg.com/lightweight-charts@5.0.0/dist/lightweight-charts.standalone.production.js"></script>

  <script>
    // Create the chart
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
      width: 800,
      height: 500,
    });

    // Add a line series (you can change to candlestick later)
    const lineSeries = chart.addLineSeries();

    // Sample stock data (Apple prices)
    lineSeries.setData([
      { time: '2025-01-01', value: 150 },
      { time: '2025-01-02', value: 152 },
      { time: '2025-01-03', value: 148 },
      { time: '2025-01-06', value: 155 },
      { time: '2025-01-07', value: 158 },
      { time: '2025-01-08', value: 160 },
      { time: '2025-01-09', value: 162 },
      { time: '2025-01-10', value: 159 },
    ]);

    // Auto-fit the chart
    chart.timeScale().fitContent();
  </script>

  <p>Scroll down or zoom on the chart. We'll make it prettier soon!</p>
</body>
</html>
